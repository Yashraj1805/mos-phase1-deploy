# Fly.io config for MOS Phase 1 backend
# Edit `app` to whatever name you pick during `fly launch`.

app = "mos-phase1-backend"
primary_region = "sin"   # Singapore — closest to India users

[build]

# Non-secret env vars. GEMINI_API_KEY is set via `fly secrets set` (not here).
[env]
  PORT = "8080"
  LLM_PROVIDER = "hybrid"
  GEMINI_MODEL = "gemini-2.5-flash"
  HYBRID_FAILURE_THRESHOLD = "3"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the machine running — Fly free tier allows 1 always-on shared-cpu VM
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
